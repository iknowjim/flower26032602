<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI花卉病虫害识别</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .upload-area:hover { background-color: #f0fdf4; border-color: #10b981; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen py-8">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-emerald-600 text-white p-6 text-center">
            <h1 class="text-2xl font-bold">🌺 AI花卉病虫害识别</h1>
            <p class="text-emerald-100 mt-1">月季 · 铁线莲 · 多肉 等专用</p>
            <p class="text-xs mt-2 opacity-75">使用稳定 CORS Proxy</p>
        </div>

        <div class="p-6">
            <!-- 上传区域 -->
            <div id="uploadArea" class="upload-area border-2 border-dashed border-emerald-300 rounded-3xl p-10 text-center cursor-pointer bg-white">
                <input type="file" id="fileInput" accept="image/*" capture="camera" class="hidden">
                <div class="mx-auto w-20 h-20 bg-emerald-100 rounded-3xl flex items-center justify-center text-5xl mb-4">📸</div>
                <p class="font-medium text-emerald-700 text-lg">点击或拖拽上传照片</p>
                <p class="text-sm text-gray-500">叶片、病斑越清晰越好</p>
            </div>

            <!-- 预览 -->
            <div id="previewContainer" class="hidden mt-6">
                <img id="previewImage" class="w-full rounded-3xl shadow-md" alt="预览">
                <button onclick="clearImage()" class="mt-4 text-sm text-red-500 hover:text-red-600">✕ 重新上传</button>
            </div>

            <!-- 按钮 -->
            <button onclick="recognizeDisease()" id="recognizeBtn"
                    class="w-full mt-8 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-3xl text-lg shadow">
                🚀 开始识别病虫害
            </button>

            <div id="loading" class="hidden mt-8 text-center">
                <div class="inline-flex items-center gap-2 text-emerald-600">
                    <div class="w-5 h-5 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin"></div>
                    AI正在诊断...
                </div>
            </div>

            <div id="result" class="hidden mt-8 bg-emerald-50 rounded-3xl p-6"></div>
        </div>
    </div>

    <script>
        // 使用更稳定的 corsproxy.io
        const CORS_PROXY = "https://corsproxy.io/?";

        async function recognizeDisease() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('请先上传一张花卉照片');

            // UI 切换
            document.getElementById('recognizeBtn').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            try {
                const form = new FormData();
                form.append('images', file);

                const targetUrl = `https://my-api.plantnet.org/v2/diseases/identify?api-key=2b10imYwpIAGLH8BX6esVUVBee&include-related-images=true`;
                
                const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);

                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    body: form
                });

                if (!response.ok) throw new Error(`HTTP错误 ${response.status}`);

                const data = await response.json();
                renderResult(data);

            } catch (error) {
                console.error(error);
                document.getElementById('result').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-2xl p-5 text-red-600">
                        <p class="font-medium">识别失败</p>
                        <p class="text-sm mt-2">${error.message}</p>
                        <p class="text-xs mt-3">提示：公共代理偶尔不稳定，可尝试重新上传或换Next.js稳定版</p>
                    </div>`;
                document.getElementById('result').classList.remove('hidden');
            } finally {
                document.getElementById('recognizeBtn').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderResult(data) {
            const resultDiv = document.getElementById('result');
            let html = `<h3 class="font-bold text-emerald-700 mb-4">🔍 识别结果（置信度从高到低）</h3>`;

            if (data.results && data.results.length > 0) {
                data.results.slice(0, 5).forEach(item => {
                    const score = (item.score * 100).toFixed(1);
                    const name = item.species ? item.species.scientificName : (item.name || '未知病害');
                    html += `
                        <div class="bg-white rounded-2xl p-4 mb-3 shadow-sm">
                            <div class="flex justify-between items-center">
                                <span class="font-medium">${name}</span>
                                <span class="text-emerald-600 font-semibold">${score}%</span>
                            </div>
                        </div>`;
                });
            } else {
                html += `<p class="text-amber-600">未检测到明显病虫害，请尝试更清晰的照片</p>`;
            }

            resultDiv.innerHTML = html;
            resultDiv.classList.remove('hidden');
        }

        // 初始化上传
        function init() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const previewContainer = document.getElementById('previewContainer');
            const previewImage = document.getElementById('previewImage');

            uploadArea.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImage.src = ev.target?.result;
                    previewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            });
        }

        window.onload = init;

        function clearImage() {
            document.getElementById('previewContainer').classList.add('hidden');
        }
    </script>
</body>
</html>
